---
layout: default
main_class: docs-shell
nav: guides
og_type: article
---

<div class="container">
  <article class="docs-article">
    <nav class="docs-breadcrumb" aria-label="Breadcrumb">
      <a href="{{ '/guides/' | relative_url }}">Guides</a>
      <span aria-hidden="true"> / </span>
      <span aria-current="page">{{ page.title | escape }}</span>
    </nav>

    <h1>{{ page.title | escape }}</h1>

    {% if page.lede %}
      <p class="docs-lede">
        {{ page.lede | escape }}
      </p>
    {% endif %}

    {{ content }}
  </article>
</div>
