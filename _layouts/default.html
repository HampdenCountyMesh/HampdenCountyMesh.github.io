<!doctype html>
<html lang="en">
{% include head.html %}
{% assign body_class = page.body_class | default: layout.body_class %}
{% assign main_class = page.main_class | default: layout.main_class %}
<body{% if body_class %} class="{{ body_class | escape }}"{% endif %}>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="noise" aria-hidden="true"></div>

  {% include header.html %}

  <main id="main"{% if main_class %} class="{{ main_class | escape }}"{% endif %}>
    {{ content }}
  </main>

  {% include footer.html %}
</body>
</html>
