name: Feature Request
description: Suggest a new feature, service, or improvement.
title: "[FEATURE] "
labels:
  - enhancement

body:
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the feature or improvement.
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: Benefit
      description: How would this improve the Hampden County Mesh Network?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
