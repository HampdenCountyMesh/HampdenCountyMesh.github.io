name: Bug Report
description: Report a problem with the website, tools, infrastructure, or documentation.
title: "[BUG] "
labels:
  - bug

body:
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Website
        - Documentation
        - GitHub Repository
        - Discord
        - Infrastructure
        - Observer
        - MQTT
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can the issue be reproduced?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior

  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
