name: Field Testing / Local Observation
description: Share a public-safe field testing note, mobile use note, device check, or local mesh observation.
title: "[Field Test]: "
labels:
  - coverage

body:
  - type: markdown
    attributes:
      value: |
        Use this template for public-safe field testing notes, mobile use notes, park checks, device checks, local mesh observations, or general map/documentation notes.

        Please do not post exact private addresses, exact private coordinates, private node locations, private observer locations, credentials, private messages, or sensitive screenshots.

        General areas are usually enough: town, neighborhood, road corridor, public park, public landmark, hill, or general area.

        For private location details, exposed credentials, private infrastructure details, or sensitive system information, do not open a public issue. Follow `SECURITY.md` or contact security@hampdencountymesh.org.

  - type: dropdown
    id: report_type
    attributes:
      label: Report type
      description: What kind of public-safe report is this?
      options:
        - Field testing note
        - Mobile use note
        - Portable node check
        - Public park or public landmark check
        - General local mesh observation
        - Map or documentation note
        - Event or temporary setup
        - Other
    validations:
      required: true

  - type: dropdown
    id: mesh_system
    attributes:
      label: System
      description: Which system was involved?
      options:
        - MeshCore
        - Meshtastic
        - Both MeshCore and Meshtastic
        - FRS / GMRS / MURS / CB / amateur radio
        - Not sure
        - Other
    validations:
      required: true

  - type: input
    id: general_area
    attributes:
      label: General area
      description: Use a town, neighborhood, public landmark, park, road corridor, hill, or general area. Do not post exact private addresses or coordinates.
      placeholder: "Example: Mittineague Park, West Springfield; Mount Tom area; downtown Westfield; I-91 corridor; western Hampden County"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe what you tried, heard, observed, or noticed.
      placeholder: "Example: Walked around a public park with a portable MeshCore node and noted whether any activity was heard."
    validations:
      required: true

  - type: textarea
    id: setup
    attributes:
      label: Device and setup
      description: Include public-safe setup details. Do not include private keys, passwords, admin URLs, exact private placement, or credentials.
      placeholder: |
        Example:
        - Device: Wio Tracker / Heltec / other
        - Antenna: stock / external / unknown
        - Placement: handheld / vehicle / window / public overlook / temporary outdoor setup
        - Power: battery / solar / USB / other
    validations:
      required: false

  - type: textarea
    id: results
    attributes:
      label: Results
      description: What worked, what did not work, or what was observed?
      placeholder: |
        Example:
        - Heard public activity from a general area
        - No activity heard during this check
        - Better results near a hill, overlook, window, or open area
        - Results changed with height, vehicle placement, antenna, or location
    validations:
      required: false

  - type: textarea
    id: conditions
    attributes:
      label: Conditions or context
      description: Optional. Include terrain, weather, foliage, building, vehicle, antenna, or time-of-day notes if useful.
      placeholder: |
        Example:
        - Public park / hill / wooded area / low spot
        - Indoors near window / outdoors / in vehicle
        - Heavy tree cover / open field / dense buildings
        - Clear weather / rain / snow / leaf-on conditions
    validations:
      required: false

  - type: textarea
    id: map_notes
    attributes:
      label: Map or documentation notes
      description: Optional. Should this become a public-safe map note, guide note, update, or future reference?
      placeholder: "Example: This may be useful as a general note for West Springfield parks, but should not include exact coordinates."
    validations:
      required: false

  - type: dropdown
    id: sharing_level
    attributes:
      label: Public sharing level
      description: How should this report be treated?
      options:
        - Public-safe as written
        - Public-safe if generalized
        - Needs review before public use
        - Private details intentionally omitted
        - Not sure
    validations:
      required: true

  - type: checkboxes
    id: privacy_check
    attributes:
      label: Privacy check
      description: Confirm that this public issue does not include sensitive information.
      options:
        - label: I have not included exact private addresses, exact private coordinates, private node locations, private observer locations, credentials, private keys, admin URLs, private messages, or sensitive screenshots.
          required: true
        - label: I understand this is a public GitHub issue and should only include information that is safe to publish.
          required: true