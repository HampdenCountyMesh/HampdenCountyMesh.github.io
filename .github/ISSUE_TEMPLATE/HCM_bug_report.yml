name: Bug Report
description: Report a problem with the website, guides, Coverage page, repository, or public documentation.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem.

        Please do not include passwords, private keys, private locations, private coordinates, private messages, screenshots with sensitive details, or anything that should not be public.

        For security or privacy issues, do not open a public issue. Please follow `SECURITY.md` or contact security@hampdencountymesh.org.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: What part of Hampden County Mesh is affected?
      options:
        - Website
        - Coverage page
        - Map or embedded map
        - Guides or documentation
        - Updates
        - GitHub repository
        - Discord documentation or join flow
        - Observer, MQTT, or map-planning documentation
        - Data or boundary files
        - Other
    validations:
      required: true

  - type: input
    id: page_or_file
    attributes:
      label: Page, file, or URL
      description: Link the affected page or name the file if you know it.
      placeholder: "Example: https://hampdencountymesh.org/coverage.html or guides/meshcore-basics.html"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem clearly.
      placeholder: "Example: A link goes to a 404 page, a page does not load correctly, or wording appears outdated."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can someone else see the same problem?
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: "Example: The link should open the current guide page."

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
      placeholder: "Example: The link goes to a 404 page, the map area is blank, or the page layout is broken."

  - type: input
    id: browser
    attributes:
      label: Browser and device
      description: Include browser, operating system, and device if relevant.
      placeholder: "Example: Firefox on Windows 11, Safari on iPhone, Chrome on Android"

  - type: textarea
    id: logs_or_screenshots
    attributes:
      label: Logs, screenshots, or extra context
      description: Add screenshots, browser console output, or extra details only if they do not contain private or sensitive information.
      placeholder: "Paste public-safe details here."

  - type: checkboxes
    id: privacy_check
    attributes:
      label: Privacy check
      description: Confirm that this public issue does not include sensitive information.
      options:
        - label: I have not included passwords, private keys, private locations, private coordinates, private messages, or sensitive screenshots.
          required: true