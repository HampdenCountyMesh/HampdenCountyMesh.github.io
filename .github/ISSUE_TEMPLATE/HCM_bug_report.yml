name: Bug Report
description: Report a problem with the website, guides, live map, analyzer, repository, or public documentation.
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem.

        Do not include credentials, private messages, exact non-public locations, sensitive screenshots, or information that could provide unauthorized access.

        Security and privacy concerns should be reported privately to [security@hampdencountymesh.org](mailto:security@hampdencountymesh.org), not through a public issue.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: What part of Hampden County Mesh is affected?
      options:
        - Public website
        - Guides
        - Updates
        - Live map
        - Activity analyzer
        - MeshMapper or coverage observations
        - Repository documentation
        - GitHub workflow or template
        - Discord join route or tracking
        - Other
    validations:
      required: true

  - type: input
    id: page_or_file
    attributes:
      label: Page, file, or URL
      description: Link the affected page or name the repository file.
      placeholder: "Example: https://map.hampdencountymesh.org/ or guides/meshcore-basics.html"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem and where you encountered it.
      placeholder: "Example: A link opens a deleted page, a map control does not work on mobile, or wording is outdated."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the steps needed to see the problem, when applicable.
      placeholder: |
        1. Open ...
        2. Select ...
        3. See ...

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
      placeholder: "Example: The link should open the current guide page."

  - type: input
    id: browser
    attributes:
      label: Browser and device
      description: Include the browser, operating system, and device when relevant.
      placeholder: "Example: Firefox on Windows 11 or Safari on iPhone"

  - type: textarea
    id: logs_or_screenshots
    attributes:
      label: Screenshots, console output, or additional context
      description: Add supporting information only after removing private or sensitive details.
      placeholder: "Paste public-safe details here."

  - type: checkboxes
    id: checks
    attributes:
      label: Public issue checks
      options:
        - label: I removed credentials, private messages, exact non-public locations, and other sensitive information.
          required: true
        - label: This is not a security or privacy report that should be sent privately.
          required: true