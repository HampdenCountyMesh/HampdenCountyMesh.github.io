name: Documentation Improvement
description: Suggest a correction or improvement to a guide, public page, project document, or reference.
title: "[Docs]: "
labels:
  - documentation

body:
  - type: markdown
    attributes:
      value: |
        Use this form for outdated information, unclear wording, broken references, typos, missing context, or suggested documentation improvements.

        Do not include credentials, private messages, exact non-public locations, or sensitive screenshots.

        Report security or privacy concerns privately to [security@hampdencountymesh.org](mailto:security@hampdencountymesh.org).

  - type: input
    id: page
    attributes:
      label: Document, page, or file
      description: Which page, guide, document, or repository file needs attention?
      placeholder: "Example: guides/meshcore-basics.html, building-better-mesh-coverage.html, README.md, or docs/infrastructure.md"
    validations:
      required: true

  - type: dropdown
    id: documentation_type
    attributes:
      label: Type of documentation issue
      options:
        - Typo or grammar
        - Broken link or reference
        - Outdated information
        - Unclear wording
        - Missing beginner context
        - Incorrect terminology
        - Retired page or old path
        - Suggested new guide or section
        - Other
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What needs improvement?
      description: Describe what is unclear, outdated, missing, or incorrect.
      placeholder: "Example: The page links to an old route or describes an active service as a future project."
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: Add replacement wording, a corrected link, or another proposed fix when available.
      placeholder: "Example: Replace the old link with the current guide or service URL."

  - type: checkboxes
    id: privacy_check
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, private messages, exact non-public locations, and other sensitive information.
          required: true
        - label: This is a public documentation request, not a private security or conduct report.
          required: true