name: Documentation Improvement
description: Suggest a correction or improvement to guides, project documentation, public pages, wording, or reference material.
title: "[Docs]: "
labels:
  - documentation

body:
  - type: markdown
    attributes:
      value: |
        Use this form for outdated information, unclear wording, broken references, typos, missing context, or suggested documentation improvements.

        Do not include credentials, private messages, exact non-public locations, or sensitive screenshots.

        Security and privacy concerns should be reported privately through `SECURITY.md` or by emailing security@hampdencountymesh.org.

  - type: input
    id: page
    attributes:
      label: Document, page, or file
      description: Which page, guide, document, or repository file needs attention?
      placeholder: "Example: guides/meshcore-basics.html, coverage.html, README.md, or docs/infrastructure.md"
    validations:
      required: true

  - type: dropdown
    id: documentation_type
    attributes:
      label: Type of documentation issue
      options:
        - Typo or grammar
        - Broken link or reference
        - Outdated information
        - Unclear wording
        - Missing beginner context
        - Incorrect terminology
        - Retired page or old path
        - Suggested new guide or section
        - Other
    validations:
      required: true

  - type: textarea
    id: issue
    attributes:
      label: What needs improvement?
      description: Describe what is unclear, outdated, missing, or incorrect.
      placeholder: "Example: The page describes the live map as a future project."
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested change
      description: Include replacement wording, a corrected link, or another proposed fix when available.
      placeholder: "Example: Replace the old description with current live-map wording."

  - type: dropdown
    id: audience
    attributes:
      label: Main audience affected
      options:
        - Beginners
        - General website visitors
        - MeshCore users
        - Meshtastic users
        - Contributors or maintainers
        - Discord members
        - Multiple audiences
        - Not sure

  - type: checkboxes
    id: public_issue_checks
    attributes:
      label: Public issue checks
      options:
        - label: I have removed credentials, private messages, exact non-public locations, and other sensitive information.
          required: true
        - label: This is a documentation request, not a private security or conduct report.
          required: true