name: Feature Request
description: Suggest a new website function, map improvement, integration, automation, or repository workflow.
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        Use this form for new functionality, integrations, automation, map or analyzer improvements, and repository workflows.

        For wording corrections, guide changes, or new documentation, use the Documentation Improvement template.

        For events, outreach, partnerships, or community resources, use the Community template.

        Do not include credentials, private messages, exact non-public locations, or sensitive infrastructure details.

        Security and privacy concerns should be reported privately through `SECURITY.md` or by emailing security@hampdencountymesh.org.

  - type: dropdown
    id: category
    attributes:
      label: Feature category
      description: What kind of improvement is this?
      options:
        - Website functionality
        - Live map
        - Activity analyzer
        - Observed-activity or data workflow
        - Discord integration or bot
        - Automation or monitoring
        - Discord join tracking
        - Repository or GitHub workflow
        - Accessibility or user experience
        - Other
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the feature or improvement.
      placeholder: "Example: Add a visible service-status notice when the live map is unavailable."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What problem would this solve?
      placeholder: "Example: Visitors currently cannot tell whether a quiet map reflects low activity or a service outage."
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: Expected benefit
      description: Who would benefit and how?
      placeholder: "Example: This would help visitors understand the map state without needing to ask in Discord."

  - type: textarea
    id: details
    attributes:
      label: Technical or practical details
      description: Include relevant public links, dependencies, limitations, or examples.
      placeholder: |
        Does this affect the website, map, analyzer, Discord, or GitHub?
        Does it depend on an outside service?
        Would it require ongoing maintenance?
        Are there privacy or accessibility considerations?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note any simpler approaches or existing tools that may solve the same problem.
      placeholder: "Example: A static notice on the Coverage page could be used instead of automated status checking."

  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority
      options:
        - Current problem
        - Useful near-term improvement
        - Nice to have
        - Long-term idea
        - Not sure

  - type: checkboxes
    id: public_issue_checks
    attributes:
      label: Public issue checks
      options:
        - label: I have removed credentials, private messages, exact non-public locations, and sensitive infrastructure details.
          required: true
        - label: This is a feature request rather than a documentation correction, community proposal, or private security report.
          required: true