name: Feature Request
description: Suggest a new website feature, guide, map improvement, integration, workflow, or public-facing improvement.
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        Use this template for new ideas, feature requests, site improvements, guide ideas, map improvements, Discord integrations, automation ideas, or public-facing tools.

        Please do not include private locations, private coordinates, credentials, private messages, sensitive screenshots, or anything that should not be public.

        For security or privacy concerns, do not open a public issue. Please follow `SECURITY.md` or contact security@hampdencountymesh.org.

  - type: dropdown
    id: category
    attributes:
      label: Feature category
      description: What kind of improvement is this?
      options:
        - Website or page improvement
        - Guide or documentation idea
        - Coverage page or map improvement
        - Observed activity or public-safe data workflow
        - Updates or public note
        - Discord integration or automation
        - MeshCore or Meshtastic support
        - Radio learning resource
        - Community event or outreach support
        - Repository or GitHub workflow
        - Other
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the feature or improvement.
      placeholder: "Example: Add a public-safe way to collect field testing notes from parks, road corridors, or temporary device checks."
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: Benefit
      description: How would this help Hampden County Mesh, newcomers, maintainers, or the local radio and mesh community?
      placeholder: "Example: This would make it easier for people to share useful local notes without posting private locations."
    validations:
      required: false

  - type: textarea
    id: details
    attributes:
      label: Useful details
      description: Add any relevant public-safe context, links, examples, or constraints.
      placeholder: |
        Is this for the website, Discord, GitHub, maps, guides, or backend tools?
        Does it need automation?
        Does it depend on outside services?
        Are there privacy concerns?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Are there simpler ways to solve the same problem?
      placeholder: "Example: This could start as a short update or guide note before becoming an automated tool."
    validations:
      required: false

  - type: dropdown
    id: timing
    attributes:
      label: Timing
      description: How urgent or near-term is this?
      options:
        - Useful now
        - Useful soon
        - Nice to have later
        - Long-term idea
        - Not sure
    validations:
      required: false

  - type: checkboxes
    id: privacy_check
    attributes:
      label: Privacy check
      description: Confirm that this public issue does not include sensitive information.
      options:
        - label: I have not included private locations, private coordinates, credentials, private messages, or sensitive screenshots.
          required: true