name: Feature Request
description: Suggest a website function, map improvement, integration, automation, or repository workflow.
title: "[Feature]: "
labels:
  - enhancement

body:
  - type: markdown
    attributes:
      value: |
        Use this form for new functionality, integrations, automation, map or analyzer improvements, and repository workflows.

        Use the Documentation Improvement template for wording or guide changes. Use the Community template for events, outreach, partnerships, or local resources.

        Do not include credentials, private messages, exact non-public locations, or sensitive infrastructure details.

        Report security or privacy concerns privately to [security@hampdencountymesh.org](mailto:security@hampdencountymesh.org).

  - type: dropdown
    id: category
    attributes:
      label: Feature category
      description: What kind of improvement is this?
      options:
        - Website functionality
        - Live map
        - Activity analyzer
        - Data or observed-activity workflow
        - Discord integration, bot, or join tracking
        - Automation or monitoring
        - Repository or GitHub workflow
        - Accessibility or user experience
        - Other
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed feature
      description: Describe the feature or improvement.
      placeholder: "Example: Add a visible service-status notice when the live map is unavailable."
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What problem would this solve, and who would it help?
      placeholder: "Example: Visitors cannot easily tell whether a quiet map reflects low activity or a service outage."
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Technical or practical details
      description: Include relevant public links, dependencies, limitations, maintenance needs, or examples.
      placeholder: |
        What parts of the project would this affect?
        Does it depend on an outside service?
        Would it require ongoing maintenance?
        Are there privacy or accessibility considerations?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note any simpler approaches or existing tools that may solve the same problem.
      placeholder: "Example: Add a short static explanation near the live map link instead of automated status checking."

  - type: checkboxes
    id: privacy_check
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, private messages, exact non-public locations, and sensitive infrastructure details.
          required: true
        - label: This is a public feature request, not a documentation correction, community proposal, or private security report.
          required: true