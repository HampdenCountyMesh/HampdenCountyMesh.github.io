name: Community
description: Suggest a community resource, event, outreach idea, partnership, or learning opportunity.
title: "[Community]: "
labels:
  - community

body:
  - type: markdown
    attributes:
      value: |
        Use this form for public community ideas, events, workshops, outreach, local resources, and possible partnerships.

        Keep locations and contact details general. Do not include private addresses, messages, exact non-public installation locations, or sensitive information.

        Report security or privacy concerns privately to [security@hampdencountymesh.org](mailto:security@hampdencountymesh.org).

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What kind of proposal is this?
      options:
        - Event, workshop, or seminar
        - Local organization, partnership, or venue
        - Coverage-building or site outreach
        - Local mesh or radio resource
        - Outreach or printed materials
        - Discord or community coordination
        - Accessibility or newcomer support
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the idea, resource, or opportunity.
      placeholder: "Example: A local library may be interested in hosting a beginner MeshCore presentation."
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Add useful public context.
      placeholder: |
        Who might this help?
        What would it involve?
        Are there timing, accessibility, equipment, or space considerations?

  - type: input
    id: general_area
    attributes:
      label: General area
      description: Include a town or broad area when location matters. Do not post a private address.
      placeholder: "Example: Westfield, Springfield, or western Hampden County"

  - type: textarea
    id: public_links
    attributes:
      label: Public links or references
      description: Add relevant public organization pages, event listings, or other references.
      placeholder: "https://example.org/"

  - type: textarea
    id: suggested_followup
    attributes:
      label: Suggested next step
      description: What would be a reasonable next action?
      placeholder: "Example: Discuss it in Discord, contact the organization, or prepare a short presentation."

  - type: checkboxes
    id: privacy_check
    attributes:
      label: Privacy check
      options:
        - label: I removed private contact details, addresses, exact non-public locations, private messages, and sensitive screenshots.
          required: true
        - label: This is a public community proposal, not a private security, conduct, or access report.
          required: true