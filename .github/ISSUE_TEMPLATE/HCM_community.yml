name: Community
description: Suggest a community resource, event, outreach idea, local partnership, or learning opportunity.
title: "[Community]: "
labels:
  - community

body:
  - type: markdown
    attributes:
      value: |
        Use this form for public community ideas, events, workshops, outreach, useful local resources, Discord coordination, or possible partnerships.

        Keep locations and contact details general. Do not include private addresses, private messages, exact non-public installation locations, or sensitive information.

        Security and privacy concerns should be reported privately through `SECURITY.md` or by emailing security@hampdencountymesh.org.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What kind of community proposal is this?
      options:
        - Event, workshop, or seminar
        - Library, club, school, or makerspace
        - Coverage-building or site outreach
        - Local mesh or radio resource
        - General outreach or printed materials
        - Discord or community coordination
        - Accessibility or newcomer support
        - Website or update content
        - Other
    validations:
      required: true

  - type: dropdown
    id: related_area
    attributes:
      label: Related area
      description: Where would this mainly apply?
      options:
        - Website
        - Discord
        - Local event or workshop
        - Local organization or venue
        - Coverage or community infrastructure
        - Multiple areas
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the idea, resource, or opportunity.
      placeholder: "Example: A local library may be interested in hosting a beginner MeshCore presentation."
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Add any useful public context.
      placeholder: |
        Who might this help?
        What would the activity or resource involve?
        Is there a general town or area involved?
        Are there timing, accessibility, equipment, or space considerations?

  - type: input
    id: general_area
    attributes:
      label: General area
      description: Include a town or broad area when location matters. Do not post a private address.
      placeholder: "Example: Westfield, Springfield, or western Hampden County"

  - type: textarea
    id: public_links
    attributes:
      label: Public links or references
      description: Add public organization pages, event listings, or other relevant references.
      placeholder: "https://example.org/"

  - type: textarea
    id: suggested_followup
    attributes:
      label: Suggested next step
      description: What would be a reasonable next action?
      placeholder: "Example: Discuss it in Discord, contact the organization, prepare a short presentation, or add it to an outreach list."

  - type: checkboxes
    id: public_issue_checks
    attributes:
      label: Public issue checks
      options:
        - label: I have removed private contact details, private addresses, exact non-public locations, private messages, and sensitive screenshots.
          required: true
        - label: This is a public community proposal, not a private security, conduct, or access report.
          required: true