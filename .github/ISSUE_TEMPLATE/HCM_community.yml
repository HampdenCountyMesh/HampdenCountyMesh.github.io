name: Community
description: Suggest or report something related to community resources, events, outreach, or local coordination.
title: "[Community]: "
labels:
  - community

body:
  - type: markdown
    attributes:
      value: |
        Use this for community-related topics such as event ideas, library or club contacts, local learning sessions, outreach ideas, useful resources, Discord/community coordination, or public-facing community notes.

        Please do not include private contact information, private addresses, private node locations, private coordinates, private messages, or sensitive screenshots.

        For security or privacy concerns, do not open a public issue. Please follow `SECURITY.md` or contact security@hampdencountymesh.org.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What kind of community item is this?
      options:
        - Event or seminar idea
        - Library, club, school, or makerspace contact
        - Local radio or mesh resource
        - Outreach idea
        - Discord or community coordination
        - Website community information
        - Accessibility or newcomer support
        - Other
    validations:
      required: true

  - type: dropdown
    id: related_area
    attributes:
      label: Related area
      description: Where does this mainly apply?
      options:
        - Website
        - Discord
        - GitHub
        - Local event or in-person activity
        - Local organization or venue
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the idea, issue, resource, or opportunity.
      placeholder: "Example: A local library may be a good place to host a beginner radio basics session."
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Add any useful public-safe context.
      placeholder: |
        What is the idea or issue?
        Who might it help?
        Is there a public link?
        Is there a general town or area involved?
        Are there timing considerations?
    validations:
      required: false

  - type: textarea
    id: public_links
    attributes:
      label: Public links or references
      description: Add public websites, public event pages, or public organization pages if relevant.
      placeholder: "Example: https://example.org/events"

  - type: textarea
    id: suggested_followup
    attributes:
      label: Suggested follow-up
      description: What should happen next?
      placeholder: "Example: Add this to the outreach list, discuss in Discord, contact the venue closer to launch, or write a guide page."

  - type: checkboxes
    id: privacy_check
    attributes:
      label: Privacy check
      description: Confirm that this public issue does not include sensitive information.
      options:
        - label: I have not included private contact information, private addresses, private node locations, private coordinates, private messages, or sensitive screenshots.
          required: true