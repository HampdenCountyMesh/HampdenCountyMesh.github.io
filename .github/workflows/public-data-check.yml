name: Public data check

on:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "coverage.html"
      - ".github/workflows/public-data-check.yml"
  pull_request:
    branches:
      - main
    paths:
      - "data/**"
      - "coverage.html"
      - ".github/workflows/public-data-check.yml"

jobs:
  validate-public-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate public JSON files
        run: |
          python -m json.tool data/status.json > /dev/null
          python -m json.tool data/nodes.json > /dev/null
          python -m json.tool data/observed-activity.json > /dev/null

      - name: Check public data for obvious secret values
        run: |
          if grep -RniE '(BEGIN PRIVATE KEY|ghp_|github_pat_|sk-[A-Za-z0-9]{20,}|api[_-]?key[[:space:]]*[:=][[:space:]]*["'\'']?[A-Za-z0-9_-]{16,}|token[[:space:]]*[:=][[:space:]]*["'\'']?[A-Za-z0-9_-]{16,}|password[[:space:]]*[:=][[:space:]]*["'\'']?.{8,})' data/; then
            echo "Potential secret value found in public data files."
            exit 1
          fi

      - name: Block accidental exact coordinates in public data
        run: |
          if grep -RniE '"(latitude|longitude|lat|lon)"[[:space:]]*:[[:space:]]*-?[0-9]' data/; then
            echo "Numeric coordinate field found in public data."
            echo "Use null or a general location unless exact public sharing is intentional and reviewed."
            exit 1
          fi
