name: Public data check

on:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "coverage.html"
      - ".github/workflows/public-data-check.yml"
  pull_request:
    branches:
      - main
    paths:
      - "data/**"
      - "coverage.html"
      - ".github/workflows/public-data-check.yml"

jobs:
  validate-public-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate JSON and GeoJSON files
        run: |
          python <<'PY'
          import json
          from pathlib import Path

          data_dir = Path("data")

          if not data_dir.exists():
              print("No data directory found. Nothing to validate.")
              raise SystemExit(0)

          files = sorted(
              list(data_dir.rglob("*.json")) +
              list(data_dir.rglob("*.geojson"))
          )

          if not files:
              print("No JSON or GeoJSON files found under data/.")
              raise SystemExit(0)

          failed = False

          for path in files:
              try:
                  with path.open("r", encoding="utf-8") as f:
                      json.load(f)
                  print(f"Valid JSON: {path}")
              except Exception as exc:
                  print(f"Invalid JSON: {path}")
                  print(exc)
                  failed = True

          if failed:
              raise SystemExit(1)
          PY

      - name: Check public data for obvious secret values
        run: |
          python <<'PY'
          import re
          from pathlib import Path

          data_dir = Path("data")

          if not data_dir.exists():
              print("No data directory found. Nothing to scan.")
              raise SystemExit(0)

          patterns = [
              r"BEGIN PRIVATE KEY",
              r"ghp_[A-Za-z0-9_]+",
              r"github_pat_[A-Za-z0-9_]+",
              r"sk-[A-Za-z0-9]{20,}",
              r"api[_-]?key\s*[:=]\s*[\"']?[A-Za-z0-9_-]{16,}",
              r"token\s*[:=]\s*[\"']?[A-Za-z0-9_-]{16,}",
              r"password\s*[:=]\s*[\"']?.{8,}",
              r"webhook\s*[:=]\s*[\"']?https?://",
          ]

          combined = re.compile("|".join(patterns), re.IGNORECASE)

          failed = False

          for path in sorted(data_dir.rglob("*")):
              if not path.is_file():
                  continue

              try:
                  text = path.read_text(encoding="utf-8", errors="ignore")
              except Exception:
                  continue

              for line_number, line in enumerate(text.splitlines(), start=1):
                  if combined.search(line):
                      print(f"Potential secret value found: {path}:{line_number}")
                      failed = True

          if failed:
              raise SystemExit(1)

          print("No obvious secret values found in public data files.")
          PY

      - name: Block accidental exact coordinate fields in public data
        run: |
          python <<'PY'
          import json
          from pathlib import Path

          data_dir = Path("data")
          coordinate_keys = {"latitude", "longitude", "lat", "lon"}

          if not data_dir.exists():
              print("No data directory found. Nothing to scan.")
              raise SystemExit(0)

          files = sorted(
              list(data_dir.rglob("*.json")) +
              list(data_dir.rglob("*.geojson"))
          )

          failed = False

          def check_value(value, path, trail):
              global failed

              if isinstance(value, dict):
                  for key, child in value.items():
                      child_trail = f"{trail}.{key}" if trail else key

                      if key.lower() in coordinate_keys and isinstance(child, (int, float)):
                          print(f"Numeric coordinate field found: {path} at {child_trail}")
                          failed = True

                      check_value(child, path, child_trail)

              elif isinstance(value, list):
                  for index, child in enumerate(value):
                      check_value(child, path, f"{trail}[{index}]")

          for path in files:
              with path.open("r", encoding="utf-8") as f:
                  data = json.load(f)

              check_value(data, path, "")

          if failed:
              print("Use null or a general location unless exact public sharing is intentional and reviewed.")
              raise SystemExit(1)

          print("No accidental numeric latitude/longitude fields found.")
          PY